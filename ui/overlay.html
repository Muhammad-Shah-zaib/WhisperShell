<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhisperShell Overlay</title>
  <link rel="icon" type="image/svg+xml" href="icons/whispershell-icon.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Lavender-black theme */
      --bg-card: rgba(18, 15, 24, 0.9);
      --border:  rgba(180, 160, 220, 0.15);
      --accent:  #b4a0e5;
      --text-primary: #e8eaf0;
      --success: #b4a0e5;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    /* ── Pill ── */
    .pill {
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      width: fit-content;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.45);
      transition: all 0.3s ease;
      margin-bottom: 0;
      height: 36px;
    }

    /* ── Logo ── */
    .logo {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* ── States ── */
    .state { display: none; align-items: center; height: 100%; }
    .state.active { display: flex; }

    /* Voicegram bars (Listening) */
    .bars {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 16px;
    }
    .bar {
      width: 3px;
      border-radius: 2px;
      background: var(--accent);
      opacity: 0.9;
      animation: vg 0.8s ease-in-out infinite alternate;
      transform-origin: bottom center;
    }
    .bar:nth-child(1) { height: 8px;  animation-delay: 0.0s; }
    .bar:nth-child(2) { height: 14px; animation-delay: 0.2s; }
    .bar:nth-child(3) { height: 10px; animation-delay: 0.4s; }
    .bar:nth-child(4) { height: 16px; animation-delay: 0.1s; }
    .bar:nth-child(5) { height: 6px;  animation-delay: 0.3s; }
    
    @keyframes vg {
      from { transform: scaleY(0.3); }
      to   { transform: scaleY(1); }
    }

    /* Jumping Dots (Processing) */
    .dots {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 16px;
    }
    .dot-jump {
      width: 4px;
      height: 4px;
      background: var(--accent);
      border-radius: 50%;
      animation: jump 0.6s infinite alternate;
    }
    .dot-jump:nth-child(1) { animation-delay: 0s; }
    .dot-jump:nth-child(2) { animation-delay: 0.2s; }
    .dot-jump:nth-child(3) { animation-delay: 0.4s; }

    @keyframes jump {
      from { transform: translateY(3px); }
      to   { transform: translateY(-3px); }
    }

    /* Done / Validation */
    .done-icon {
      color: var(--success);
      font-size: 16px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

  <div class="pill" id="pill">
    
    <!-- Tauri Logo -->
    <div class="logo">
      <img src="icons/whispershell-icon.svg" alt="Logo" />
    </div>

    <!-- Recording State -->
    <div class="state active" id="state-recording">
      <div class="bars">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
    </div>

    <!-- Processing State -->
    <div class="state" id="state-processing">
      <div class="dots">
        <div class="dot-jump"></div>
        <div class="dot-jump"></div>
        <div class="dot-jump"></div>
      </div>
    </div>

    <!-- Done State -->
    <div class="state" id="state-done">
      <div class="done-icon">✓</div>
    </div>

  </div>

  <script type="module">
    const { event } = window.__TAURI__;
    const pill            = document.getElementById('pill');
    const stateRecording  = document.getElementById('state-recording');
    const stateProcessing = document.getElementById('state-processing');
    const stateDone       = document.getElementById('state-done');

    function show(el) {
      [stateRecording, stateProcessing, stateDone].forEach(s => s.classList.remove('active'));
      el.classList.add('active');
    }

    event.listen('state_changed', (e) => {
      if      (e.payload === 'Recording')  show(stateRecording);
      else if (e.payload === 'Processing') show(stateProcessing);
    });

    event.listen('transcript_ready', (e) => {
      show(stateDone);
    });
  </script>

</body>
</html>
