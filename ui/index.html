<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhisperShell</title>
  <link rel="icon" type="image/svg+xml" href="icons/whispershell-icon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg-base:     #0b090f;
      --bg-card:     #120f18;
      --border:      rgba(180, 160, 220, 0.15);
      --accent:      #b4a0e5;
      --text-primary: #e8eaf0;
      --text-muted:   #8a829e;
      --radius:      12px;
      
      --red:         #ff6b81;
      --amber:       #ff9f43;
    }

    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      width: 440px;
      padding: 24px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }
    
    .logo-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .logo-group img {
      width: 20px;
      height: 20px;
    }

    .title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .status-group {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: background 0.3s;
    }
    .status-dot.idle { background: var(--text-muted); }
    .status-dot.recording { background: var(--red); box-shadow: 0 0 8px var(--red); }
    .status-dot.processing { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
    
    .info-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
    }
    
    kbd {
      background: rgba(180, 160, 220, 0.1);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      font-family: monospace;
      color: var(--accent);
    }

    .transcript-box {
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      min-height: 80px;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text-primary);
      position: relative;
    }

    .placeholder {
      color: var(--text-muted);
      font-style: italic;
      text-align: center;
    }
    
    .copy-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 10px;
      color: var(--accent);
      background: rgba(180, 160, 220, 0.1);
      padding: 2px 6px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .copy-badge.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo-group">
        <img src="icons/whispershell-icon.svg" alt="Logo" />
        <span class="title">WhisperShell</span>
      </div>
      <div class="status-group">
        <div class="status-dot idle" id="orb"></div>
        <span id="status-label">Idle</span>
      </div>
    </div>
    
    <div class="info-row">
      <span>Trigger: <kbd>whispershell --toggle-recording</kbd></span>
      <span id="model-status">Loading model…</span>
    </div>

    <div class="transcript-box" id="transcript-section">
      <div class="copy-badge" id="copy-badge">Copied!</div>
      <div id="transcript-placeholder" class="placeholder">
        Run trigger command to start recording.
      </div>
      <div id="transcript-text" style="display:none;"></div>
    </div>
  </div>

  <script type="module">
    const { invoke, event } = window.__TAURI__;

    const orb           = document.getElementById('orb');
    const statusLabel   = document.getElementById('status-label');
    const modelStatus   = document.getElementById('model-status');
    const placeholder   = document.getElementById('transcript-placeholder');
    const transcriptEl  = document.getElementById('transcript-text');
    const copyBadge     = document.getElementById('copy-badge');

    const STATE_MAP = {
      Idle:       { label: 'Idle',       cls: 'idle'       },
      Recording:  { label: 'Recording',  cls: 'recording'  },
      Processing: { label: 'Processing', cls: 'processing' },
    };

    function applyState(name) {
      const s = STATE_MAP[name] || STATE_MAP.Idle;
      orb.className = `status-dot ${s.cls}`;
      statusLabel.textContent = s.label;
    }

    event.listen('state_changed', (e) => applyState(e.payload));

    event.listen('model_ready', (e) => {
      modelStatus.textContent = e.payload;
    });

    event.listen('transcript_ready', (e) => {
      const text = e.payload;
      placeholder.style.display = 'none';
      transcriptEl.style.display = 'block';
      transcriptEl.textContent = text;
      
      copyBadge.classList.add('visible');
      setTimeout(() => copyBadge.classList.remove('visible'), 3000);
    });

    event.listen('whisper_error', (e) => {
      modelStatus.textContent = `Error: ${e.payload}`;
    });

    invoke('get_app_info').then((info) => {
      // reserved for future use
    });
  </script>
</body>
</html>
